services:
  postgres:
    image: postgres:alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: treasure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    ports:
      - "5432:5432"

  app:
    image: oven/bun
    working_dir: /usr/app
    user: "1000:1000"
    ports:
      - "8080:8080"
    volumes:
      - ./:/usr/app
    command: sh -c "bun install && bun run dev --host 0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy